apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
namePrefix: dev-
commonLabels:
  environment: dev
patches:
  - target:
      kind: Service
      labelSelector: svc=front
    patch: |-
      - op: replace
        path: /spec/ports/0/port
        value: 54322
  - target:
      kind: Deployment
      labelSelector: svc=front
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dev-flask-app
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: flask
                env:
                  - name: REDIS_HOST
                    value: dev-redis
                  - name: ENV
                    value: DEVELOPMENT
