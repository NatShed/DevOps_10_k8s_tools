apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  labels:
    app: flask-app
    svc: front
spec:
  replicas: 5
  selector:
    matchLabels:
      app: flask-app
      svc: front
  template:
    metadata:
      labels:
        app: flask-app
        svc: front
    spec:
      containers:
        - name: flask
          image: flask:v2          # после сборки образа
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
